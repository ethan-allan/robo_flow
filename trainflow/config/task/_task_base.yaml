# Shared task defaults. Pulled into each real task config via
# `defaults: - _task_base`. Per-task files only need to declare
# `name`, `dataset_path`, `image_shape`, `shape_meta`, and any
# overrides (relative_action, rpy_for_rotation, obs_temporal_downsample_ratio).
#
# Future home for the deployment-runner `obs_sources:` mapping (planned in
# the 2026-05-13 plan) — leaving the dataset block at this layer means a
# task only needs to add `obs_sources:` at its top level without
# touching boilerplate.

dataset:
  _target_: trainflow.dataset.real_image_tactile_dataset.RealImageTactileDataset
  shape_meta: ${task.shape_meta}
  dataset_path: ${task.dataset_path}
  horizon: ${horizon}
  pad_before: ${eval:'${dataset_obs_steps}-1+${n_latency_steps}'}
  pad_after: ${eval:'${n_action_steps}-1'}
  n_obs_steps: ${dataset_obs_steps}
  n_latency_steps: ${n_latency_steps}
  seed: 42
  val_ratio: 0.1
  max_train_episodes: null
  delta_action: False
  relative_action: False
