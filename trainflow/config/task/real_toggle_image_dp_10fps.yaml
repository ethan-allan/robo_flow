# Template task config (stripped of env_runner / kineteach / real-robot fields).
# Duplicate this file and update name / dataset_path / shape_meta to wire your own data.

name: real_toggle_image_dp_10fps

image_shape: [3, 360, 640]
dataset_path: data/toggle_v1_zarr

shape_meta: &shape_meta
  # acceptable types: rgb, low_dim
  obs:
    right_wrist_img:
      shape: ${task.image_shape}
      type: rgb
    right_robot_tcp_pose:
      shape: [9]
      type: low_dim
  action:
    shape: [9] # (3+6) (x, y, z, 6d rotation)

dataset:
  _target_: trainflow.dataset.real_image_tactile_dataset.RealImageTactileDataset
  shape_meta: *shape_meta
  dataset_path: ${task.dataset_path}
  horizon: ${horizon}
  pad_before: ${eval:'${dataset_obs_steps}-1+${n_latency_steps}'}
  pad_after: ${eval:'${n_action_steps}-1'}
  n_obs_steps: ${dataset_obs_steps}
  n_latency_steps: ${n_latency_steps}
  seed: 42
  val_ratio: 0.1
  max_train_episodes: null
  delta_action: False
  relative_action: True
