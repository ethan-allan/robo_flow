# Reactive (HF-RNN) variant of peg_insertion_vrr_5fps. Same composed
# deploy stack; the reactive-only addition is `extended_obs` which
# declares a second view of `eef_force` for the GRU obs encoder
# (zarr_writer dedups so the underlying array is stored once).
#
# Action stays 19-D VRR, collapsed to 13-D in model_shape_meta via
# rpy_for_rotation. Reactivity is wrench conditioning on top of the
# VRR action, not instead of it.
#
# Zarr layout (identical to peg_insertion_vrr_5fps — extended_obs
# adds no new arrays):
#   data/replay_buffers/peg_insertion_reactive_5fps/replay_buffer.zarr/
#     data/
#       rgb            (T_total, H, W, 3)  uint8
#       eef_state      (T_total, 9)        float32
#       eef_force      (T_total, 6)        float32
#       action         (T_total, 19)       float32
#     meta/
#       episode_ends   (n_eps,)            int64
defaults:
  - _task_base
  - /hardware: ur3_bir_default
  - /hardware/sensor_pipelines@shape_meta.obs.rgb:        platform_realsense_rgb
  - /hardware/sensor_pipelines@shape_meta.obs.eef_state:  ur3_eef_state
  - /hardware/sensor_pipelines@shape_meta.obs.eef_force:  ur3_eef_force
  - /hardware/ur3/action_modes@shape_meta.action:         vrr_19d
  - _self_

name: peg_insertion_reactive_5fps

image_shape: [3, 256, 256]
image_resize_shape: null
raw_episodes: trainflow/dataset/peg_hole_tac
# Reuses the existing peg_insertion_vrr_5fps zarr — extended_obs adds no
# new arrays so no rebuild is needed. Repoint if you bundle a fresh one.
dataset_path: data/replay_buffers/peg_insertion_vrr_5fps

# Reactive-only addition: same eef_force array, second temporal view
# fed to the GRU. No deploy-side ops needed (extended views reuse the
# obs sibling's pipeline at training time via zarr dedup).
shape_meta:
  extended_obs:
    eef_force:
      shape: [6]
      type: low_dim

model_shape_meta:
  obs:
    rgb:
      shape: ${task.image_shape}
      type: rgb
    eef_state:
      shape: [9]
      type: low_dim
    eef_force:
      shape: [6]
      type: low_dim
  extended_obs:
    eef_force:
      shape: [6]
      type: low_dim
  action:
    shape: [13]   # collapsed from 19D ortho6d via rpy_for_rotation
    type: 6DOF_vrr

dataset:
  obs_temporal_downsample_ratio: 1
  rpy_for_rotation: True
