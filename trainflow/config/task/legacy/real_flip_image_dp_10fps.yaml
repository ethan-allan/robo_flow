# Template task config (stripped of env_runner / kineteach / real-robot fields).
# Duplicate this file and update name / dataset_path / shape_meta to wire your own data.

defaults:
  - _task_base
  - _self_

name: real_flip_image_dp_10fps

image_shape: [3, 360, 640]
image_resize_shape: [180, 320]   # 1/2 downscale of 360x640; aspect preserved
dataset_path: data/flip_v1_zarr

shape_meta:
  # acceptable types: rgb, low_dim
  obs:
    right_wrist_img:
      shape: ${task.image_shape}
      type: rgb
    right_robot_tcp_pose:
      shape: [9]
      type: low_dim
  action:
    shape: [9] # (3+6) (x, y, z, 6d rotation)

dataset:
  relative_action: True
