# Task identity + dataset path + composed deploy stack.
#
# Sensor pipelines (per model input) and the action mode are composed
# from `config/sensor_pipelines/` and `config/action_modes/` so this
# yaml stays small. To swap the camera, the action mode, or to add a
# new input, edit the corresponding cfg under those directories — no
# change here required.
defaults:
  - _task_base
  - /hardware: ur3_bir_default
  - /hardware/sensor_pipelines@shape_meta.obs.rgb:        platform_realsense_rgb
  - /hardware/sensor_pipelines@shape_meta.obs.eef_state:  ur3_eef_state
  - /hardware/ur3/action_modes@shape_meta.action:         tcp_absolute_9d
  - _self_

name: real_ee2_dice
image_shape: [3, 256, 256]
image_resize_shape: null
dataset_path: data/ee2dice_zarr
