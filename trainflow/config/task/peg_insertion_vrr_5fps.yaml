
name: peg_insertion_vrr_5fps

image_shape: [3, 256, 256]
# Square 1:1 source. null = no resize inside encoder (Identity). Do NOT set a
# non-square value here — torchvision.transforms.Resize((h,w)) stretches.
image_resize_shape: null
raw_episodes: trainflow/dataset/peg_hole_tac          # source: per-episode .npy dirs
dataset_path: data/replay_buffers/peg_insertion_vrr_5fps  # destination: bundled zarr

shape_meta:
  # acceptable types: rgb, low_dim
  obs:
    rgb:
      shape: ${task.image_shape}
      type: rgb
    eef_state:
      shape: [9]
      type: low_dim
    eef_force:
      shape: [6]
      type: low_dim
  action:
    shape: [19] # (3+6 + 3+6 + 1) (x, y, z, 6d rotation, virtual_x, virtual_y, virtual_z, virtual_6d rotation, stiffness)
    type: 6DOF_vrr
model_shape_meta:
  # acceptable types: rgb, low_dim
  obs:
    rgb:
      shape: ${task.image_shape}
      type: rgb
    eef_state:
      shape: [9]
      type: low_dim
    eef_force:
      shape: [6]
      type: low_dim
  action:
    shape: [13] # (3+3 + 3+3 + 1) (x, y, z, r, p, y, virtual_x, virtual_y, virtual_z, virtual_r, virtual_p, virtual_y, stiffness) — collapsed from 19D ortho6d via rpy_for_rotation
    type: 6DOF_vrr

dataset:
  _target_: trainflow.dataset.real_image_tactile_dataset.RealImageTactileDataset
  shape_meta: ${task.shape_meta}
  dataset_path: ${task.dataset_path}
  horizon: ${horizon}
  pad_before: ${eval:'${dataset_obs_steps}-1+${n_latency_steps}'}
  pad_after: ${eval:'${n_action_steps}-1'}
  n_obs_steps: ${dataset_obs_steps}
  n_latency_steps: ${n_latency_steps}
  seed: 42
  val_ratio: 0.1
  max_train_episodes: null
  delta_action: False
  relative_action: False
  rpy_for_rotation: True
