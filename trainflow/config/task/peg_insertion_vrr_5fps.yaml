# Task identity + dataset paths + composed deploy stack.
#
# Sensor pipelines and the action mode are composed from
# `config/sensor_pipelines/` and `config/action_modes/`. To swap a
# sensor/mode, edit those — not this file.
defaults:
  - _task_base
  - /hardware: ur3_bir_default
  - /hardware/sensor_pipelines@shape_meta.obs.rgb:        platform_realsense_rgb
  - /hardware/sensor_pipelines@shape_meta.obs.eef_state:  ur3_eef_state
  - /hardware/sensor_pipelines@shape_meta.obs.eef_force:  ur3_eef_force
  - /hardware/ur3/action_modes@shape_meta.action:         vrr_19d
  - _self_

name: peg_insertion_vrr_5fps

image_shape: [3, 256, 256]
# Square 1:1 source. null = no resize inside encoder (Identity). Do NOT set a
# non-square value here — torchvision.transforms.Resize((h,w)) stretches.
image_resize_shape: null
raw_episodes: trainflow/dataset/peg_hole_tac          # source: per-episode .npy dirs
dataset_path: data/replay_buffers/peg_insertion_vrr_5fps  # destination: bundled zarr

# `model_shape_meta` is a separate, training-only contract — keeps the
# 19D ortho6d action collapsed to 13D (rpy) for the model head. Lives
# inline because it is not part of the deploy-side stack.
model_shape_meta:
  obs:
    rgb:
      shape: ${task.image_shape}
      type: rgb
    eef_state:
      shape: [9]
      type: low_dim
    eef_force:
      shape: [6]
      type: low_dim
  action:
    shape: [13] # collapsed from 19D ortho6d via rpy_for_rotation
    type: 6DOF_vrr

dataset:
  rpy_for_rotation: True
