defaults:
  - task: real_peel_image_dp_absolute_12fps
  - workspace_base
  - _self_

name: train_diffusion_unet_image
_target_: trainflow.workspace.train_diffusion_unet_image_workspace.TrainDiffusionUnetImageWorkspace

task_name: ${task.name}
# Policy/obs-encoder shape_meta. Falls back to task.shape_meta unless the task
# declares a separate model_shape_meta (e.g. when rpy_for_rotation collapses
# ortho6d action columns and the policy needs the post-collapse dim).
# The dataset always reads task.shape_meta directly — its action slice must
# match the raw zarr layout, not the post-collapse layout.
shape_meta: ${oc.select:task.model_shape_meta,${task.shape_meta}}
exp_name: "default"

horizon: 16
n_obs_steps: 2
n_latency_steps: 0
dataset_obs_steps: ${n_obs_steps}
n_action_steps: ${eval:'${horizon}-${dataset_obs_steps}+1'}
past_action_visible: False
keypoint_visible_rate: 1.0
obs_as_global_cond: True

# Path to the diffusion policy checkpoint for policy model
ckpt_path: null

policy:
  _target_: trainflow.policy.diffusion_unet_image_policy.DiffusionUnetImagePolicy

  shape_meta: ${shape_meta}
  
  noise_scheduler:
    _target_: diffusers.schedulers.scheduling_ddim.DDIMScheduler
    num_train_timesteps: 100
    beta_start: 0.0001
    beta_end: 0.02
    # beta_schedule is important
    # this is the best we found
    beta_schedule: squaredcos_cap_v2
    clip_sample: True
    set_alpha_to_one: True
    steps_offset: 0
    prediction_type: epsilon # or sample

  obs_encoder:
    _target_: trainflow.model.vision.multi_image_obs_encoder.MultiImageObsEncoder
    shape_meta: ${shape_meta}
    rgb_model:
     _target_: trainflow.model.vision.model_getter.get_resnet
     name: resnet18
     weights: null
    # Pulled per-task — see image_resize_shape in trainflow/config/task/*.yaml.
    # CLI override (policy.obs_encoder.resize_shape=...) still wins if provided.
    resize_shape: ${task.image_resize_shape}
    random_transforms:
      - type: RandomCrop
        ratio: 0.90
    use_group_norm: True
    share_rgb_model: False
    imagenet_norm: True

  # timm
