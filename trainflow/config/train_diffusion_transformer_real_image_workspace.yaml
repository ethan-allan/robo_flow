defaults:
  - task: real_peel_image_dp_absolute_12fps
  - workspace_base
  - _self_

name: train_diffusion_transformer_image
_target_: trainflow.workspace.train_diffusion_transformer_image_workspace.TrainDiffusionTransformerImageWorkspace

task_name: ${task.name}
# Policy/obs-encoder shape_meta. Falls back to task.shape_meta unless the task
# declares a separate model_shape_meta (e.g. when rpy_for_rotation collapses
# ortho6d action columns and the policy needs the post-collapse dim).
# The dataset always reads task.shape_meta directly — its action slice must
# match the raw zarr layout, not the post-collapse layout.
shape_meta: ${oc.select:task.model_shape_meta,${task.shape_meta}}
exp_name: "default"

horizon: 16
n_obs_steps: 2
n_latency_steps: 0
dataset_obs_steps: ${n_obs_steps}
n_action_steps: ${eval:'${horizon}-${dataset_obs_steps}+1'}
n_emb: 768

# Path to the diffusion policy checkpoint for policy model
ckpt_path: null

policy:
  _target_: trainflow.policy.diffusion_transformer_image_policy.DiffusionTransformerImagePolicy

  shape_meta: ${shape_meta}
  
  noise_scheduler:
    _target_: diffusers.schedulers.scheduling_ddim.DDIMScheduler
    num_train_timesteps: 100
    beta_start: 0.0001
    beta_end: 0.02
    # beta_schedule is important
    # this is the best we found
    beta_schedule: squaredcos_cap_v2
    clip_sample: True
    set_alpha_to_one: True
    steps_offset: 0
    prediction_type: epsilon # or sample

  obs_encoder:
    _target_: trainflow.model.vision.transformer_obs_encoder.TransformerObsEncoder
    shape_meta: ${shape_meta}
    obs_horizon: ${n_obs_steps}
    global_pool: ''
    n_emb: ${n_emb}

    ##### from scratch #####
    # model_name: 'vit_base_patch16_224'
    model_name: 'resnet34'
    # model_name: 'vit_tiny_patch16_224'
    # model_name: 'efficientnet_b0'
    # model_name: 'efficientnet_b3'
    pretrained: False
    frozen: False

    ##### from pretrained #####
    # model_name: 'resnet34.a1_in1k'
    # model_name: 'vit_base_patch16_clip_224.openai'
    # model_name: 'convnext_base.clip_laion2b_augreg_ft_in12k'
    # pretrained: True
    # frozen: False

    # 'cls' or 'avg' or 'max' or 'soft_attention' or 'spatial_embedding' or 'transformer' or 'attention_pool_2d'
    feature_aggregation: null

    # it only works for resnet. 32 (7x7) or 16 (14x14)
    downsample_ratio: 32

    transforms:
      - type: CenterCrop
      - _target_: torchvision.transforms.RandomRotation
        degrees:
          - -5.0
          - 5.0
        expand: false
      - _target_: torchvision.transforms.ColorJitter
        brightness: 0.3
        contrast: 0.4
        saturation: 0.5
        hue: 0.08

    use_group_norm: True
    share_rgb_model: False

  model:
    _target_: trainflow.model.diffusion.transformer_for_diffusion.TransformerForDiffusion
    shape_meta: ${shape_meta}
    action_horizon: ${horizon}
    n_obs_steps: ${n_obs_steps}
    cond_dim: ${n_emb}
    n_layer: 7
    n_head: 4
    n_emb: ${n_emb}
    p_drop_emb: 0.0
    p_drop_attn: 0.1
    time_as_cond: True # if false, use BERT like encoder only arch, time as input
    obs_as_cond: True
    n_cond_layers: 0  # >0: use transformer encoder for cond, otherwise use MLP

  n_emb: ${n_emb}
  horizon: ${horizon}
  n_action_steps: ${eval:'${n_action_steps}+${n_latency_steps}'}
  n_obs_steps: ${n_obs_steps}
  num_inference_steps: 5
  input_pertub: 0.1 # reference: https://github.com/forever208/DDPM-IP

  use_amp_for_inference: False
  amp_dtype: "bf16"

optimizer:
  lr: 3.0e-4
  weight_decay: 1.0e-6
  obs_encoder_lr: 3.0e-5
  obs_encoder_weight_decay: 1.0e-6
  betas: [0.95, 0.999]
  
training:
  device: "cuda:0"
  seed: 42
  debug: False
  resume: False
  pretrained_ckpt_path: null
  # AMP (Automatic Mixed Precision) settings
  use_amp: False
  amp_dtype: "bf16"  # "bf16" or "fp16"
  # optimization
  lr_scheduler: cosine
  lr_warmup_steps: 2000
  num_epochs: 600
  gradient_accumulate_every: 1
  # EMA destroys performance when used with BatchNorm
  # replace BatchNorm with GroupNorm.
  use_ema: True
  freeze_encoder: False
  # training loop control
  # in epochs
  rollout_every: 50 # dummy
  checkpoint_every: 10
  val_every: 1
  sample_every: 5
  # steps per epoch
  max_train_steps: null
  max_val_steps: null
  # misc
  tqdm_interval_sec: 1.0
  # Early stopping. Check fires inside the existing checkpoint_every branch,
  # so any break happens immediately after a save. Patience counts
  # *checkpoint events* without an improvement greater than min_delta.
  # monitor_key must be present in step_log at every checkpoint event:
  # val_action_mse_error requires sample_every | checkpoint_every and val_ratio>0.
  early_stopping:
    enabled: true
    monitor_key: val_action_mse_error
    mode: min
    patience: 50
    min_delta: 1.0e-4

logging:
  project: diffusion_policy_transformer_tactile
  resume: False
  mode: online
  name: ${now:%Y.%m.%d-%H.%M.%S}_${name}_${task_name}
  tags: ["${name}", "${task_name}", "${exp_name}"]
  id: null
  group: null

