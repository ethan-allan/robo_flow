# Default deploy pipeline for the platform RealSense RGB stream.
#
# Live sensor produces 640x480 BGR uint8; this pipeline crops to the
# capture-script's workspace ROI, resizes to model input, and converts
# to RGB. End result is what zarr_writer stores after applying the
# same crop+resize at capture time then bgr_to_rgb on load.
#
# Mounted into a task yaml via:
#   defaults:
#     - /sensor_pipelines@shape_meta.obs.rgb: platform_realsense_rgb
shape: [3, 256, 256]
type: rgb
from: cameras.platform_realsense.rgb
ops:
  - {name: crop_x, x0: 280, x1: 1000}      # record_data_gui_new.py:1697
  - {name: resize, size: [256, 256]}
  - {name: bgr_to_rgb}
