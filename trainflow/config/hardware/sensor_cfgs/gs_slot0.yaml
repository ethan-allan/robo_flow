# GelSight Mini — sorted-slot 0 of /dev/v4l/by-id.


client:
  kind: gelsight
  slot: 0
  paths: null                            # null → discover_gelsight_devices()
  record_size: [320, 240]                # GELSIGHT_RECORD_SIZE (W, H)
  fps: 25
  fourcc: MJPG
  warmup_frames: 30

shape: [3, 240, 320]
type: rgb
from: tactile.gelsight_0.rgb
ops:
  - {name: crop_x, x0: 40, x1: 280}      # 320w live -> center 240w (square)
  - {name: resize, size: [320, 240]}     # (W, H) -> matches shape [3, 240, 320]
  - {name: bgr_to_rgb}
