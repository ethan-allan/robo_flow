# Lab default hardware cfg for UR3 BIR (single-arm + tactile).
#
# This file is the SCHEMA used by deployment to drive sensor clients +
# action executor (see trainflow/env/ur3_bir/sensor_clients/, planned
# action_executor.py). The future data-collection script will emit a
# per-dataset file with this same schema; deployment composes whichever
# applies via hydra `defaults:` override (e.g. point at a saved
# hw_manifest.yaml under <dataset>/).
#
# Field origins are quoted in comments where they map to constants in
# /media/ethan/SANDISK128/capture/data_recording/record_data_gui_new.py
# so the manifest writer + this file stay aligned.
#
# This file carries PHYSICAL params only (IPs, serials, fps, gripper).
# Op kwargs (crop bounds, resize size) live inline in each task yaml's
# `shape_meta.obs.<key>.ops` block — there is no hw-cfg fallback.
# `applied_at_capture` is per-sensor (this file or the dataset manifest)
# and tells ObsBuilder which ops to skip because the source data was
# already preprocessed at capture time.
schema_version: 1

# Synchronized capture rate (5 Hz in record_data_gui_new.py:1626).
control_fps: 5

robot:
  ur3:
    host: 192.168.20.25                # ROBOT_HOST_OVERRIDE
    rtde_port: 30004
    high_rate_force_hz: 50             # HIGH_RATE_FORCE_HZ
    control_mode_pin: 7                # teleop digital-out; obs only at deploy
    # Gripper width is read from the same JSON file the capture script
    # writes (record_data_gui_new.py:read_gripper_state, line 770). Set
    # to the deployment-host's path; the capture script's default is
    # /tmp/ur_gripper_state.json.
    gripper_state_path: /tmp/ur_gripper_state.json

    # Action sinks — referenced by `shape_meta.action.out.<name>.to`
    # in task yamls. The dispatcher (step 6 action_executor.py) uses
    # `kind` to pick the RTDE control call; the rest are sink-specific
    # params consumed by the executor.
    tcp_command:
      kind: rtde_servoL                # RTDEControlInterface.servoL(...)
      lookahead_time: 0.1
      gain: 300

cameras:
  # `applied_at_capture: [<op_name>, ...]` declares which obs_sources ops
  # were already run BEFORE the frame was written to disk for this sensor.
  # ObsBuilder skips those ops at deploy time so the on-disk-equivalent
  # is reproduced (instead of double-applying e.g. crop_x). Lab default
  # below is `[]` because the new collection script writes raw frames;
  # a per-dataset hw_manifest.yaml for legacy episodes would override
  # this to e.g. `[crop_x, resize]` (capture script L1697-1712).
  platform_realsense:
    enabled: true
    serial: null                       # RS_PLATFORM_SERIAL — set per-deployment
    width: 640
    height: 480
    fps: 15
    depth_width: 640
    depth_height: 480
    applied_at_capture: []             # raw frames; legacy datasets override

  hand_realsense:
    enabled: true
    serial: null                       # RS_HAND_SERIAL
    width: 640
    height: 480
    fps: 15
    depth_width: 640
    depth_height: 480
    applied_at_capture: []

tactile:
  mode: gelsight                       # gelsight | dmtac | none
  gelsight:
    paths: null                        # null -> discover_gelsight_devices()
    record_size: [320, 240]            # GELSIGHT_RECORD_SIZE (W, H)
    fps: 25
    fourcc: MJPG
    warmup_frames: 30
  dmtac:
    enabled: false                     # reserved; client deferred to step 5+
